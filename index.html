<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devil's Canyon – Interaktive Karte</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sancreek&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #171310;
    --bg-panel: #221b16;
    --bg-panel-raised: #2c231c;
    --line: #3d3226;
    --gold: #c8a46c;
    --gold-bright: #f0cf8e;
    --fire: #e8791e;
    --fire-deep: #7a2410;
    --cream: #ece2d0;
    --cream-dim: #b8ab97;
    --cat-trapper: #a6432d;
    --cat-farming: #7a8f5c;
    --cat-resource: #5c7a8f;
    --shadow: 0 12px 32px rgba(0,0,0,0.55);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg-deep);
    color: var(--cream);
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    height: 100vh;
  }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--bg-panel);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    z-index: 10;
    box-shadow: var(--shadow);
  }

  #brand {
    padding: 26px 20px 18px;
    border-bottom: 2px solid var(--fire-deep);
    text-align: center;
    position: relative;
    background:
      radial-gradient(ellipse at 50% -20%, rgba(232,121,30,0.35), transparent 65%),
      linear-gradient(180deg, rgba(200,164,108,0.08), transparent 70%);
  }

  #brand h1 {
    font-family: 'Sancreek', serif;
    font-weight: 400;
    font-size: 34px;
    margin: 0 0 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold-bright);
    background: linear-gradient(180deg, var(--gold-bright) 20%, var(--fire) 75%, var(--fire-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 18px rgba(232,121,30,0.35);
    filter: drop-shadow(0 3px 2px rgba(0,0,0,0.7));
  }

  #brand p {
    margin: 0;
    font-size: 14px;
    color: var(--cream-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    position: relative;
    padding-top: 8px;
  }
  #brand p::before {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    margin: 0 auto 8px;
    background: linear-gradient(90deg, transparent, var(--fire), transparent);
  }

  #search-wrap {
    padding: 16px 20px 8px;
  }

  #search {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-panel-raised);
    border: 1px solid var(--line);
    border-radius: 3px;
    color: var(--cream);
    font-family: inherit;
    font-size: 17px;
    letter-spacing: 0.3px;
  }

  #search::placeholder { color: var(--cream-dim); }
  #search:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(200,164,108,0.25);
  }

  #filters {
    padding: 10px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-bottom: 1px solid var(--line);
  }

  .filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 3px;
    transition: background 0.15s ease;
    user-select: none;
  }
  .filter-row:hover { background: rgba(255,255,255,0.03); }

  .filter-swatch {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.4);
  }

  .filter-row span.label {
    flex: 1;
    font-size: 17px;
    letter-spacing: 0.2px;
  }

  .filter-row .count {
    font-size: 13px;
    color: var(--cream-dim);
    background: rgba(255,255,255,0.05);
    padding: 1px 8px;
    border-radius: 10px;
  }

  .filter-row input[type="checkbox"] {
    accent-color: var(--gold);
    width: 15px;
    height: 15px;
  }

  #list-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px 20px;
  }

  #list-wrap::-webkit-scrollbar { width: 8px; }
  #list-wrap::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .loc-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .loc-item:hover {
    background: var(--bg-panel-raised);
    border-color: var(--line);
  }
  .loc-item .dot {
    width: 10px; height: 10px; border-radius: 50%;
    margin-top: 5px; flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.4);
  }
  .loc-item .info { flex: 1; }
  .loc-item .name {
    font-size: 17px;
    color: var(--cream);
    line-height: 1.15;
  }
  .loc-item .meta {
    font-size: 13px;
    color: var(--cream-dim);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  #empty-state {
    padding: 30px 16px;
    text-align: center;
    color: var(--cream-dim);
    font-size: 15px;
    display: none;
  }

  /* ---------- Map ---------- */
  #map-wrap {
    flex: 1;
    position: relative;
    background: #0d0b09;
  }

  #map { width: 100%; height: 100%; background: #0d0b09; }

  #map-notice {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(34,27,22,0.92);
    border: 1px solid var(--line);
    color: var(--cream-dim);
    padding: 8px 18px;
    border-radius: 4px;
    font-size: 14px;
    z-index: 500;
    box-shadow: var(--shadow);
    text-align: center;
    max-width: 560px;
  }
  #map-notice b { color: var(--gold); }

  /* Leaflet overrides -> Wanted-poster popup */
  .leaflet-popup-content-wrapper {
    background: #ece2d0;
    color: #241b13;
    border-radius: 2px;
    background-image:
      radial-gradient(circle at 8% 12%, rgba(0,0,0,0.06) 0%, transparent 40%),
      radial-gradient(circle at 92% 88%, rgba(0,0,0,0.06) 0%, transparent 40%);
    box-shadow: 0 10px 28px rgba(0,0,0,0.6);
    border: 1px solid #8a7452;
  }
  .leaflet-popup-tip { background: #ece2d0; border: 1px solid #8a7452; }
  .leaflet-popup-content { margin: 16px 18px; font-family: 'Barlow Condensed', sans-serif; }

  .popup-eyebrow {
    font-size: 12px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #a6432d;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .popup-title {
    font-family: 'Sancreek', serif;
    font-weight: 400;
    font-size: 24px;
    line-height: 1.15;
    letter-spacing: 0.5px;
    margin: 0 0 8px;
    color: #241b13;
  }
  .popup-desc {
    font-size: 16px;
    line-height: 1.3;
    margin: 0 0 8px;
    color: #3a2e20;
  }
  .popup-coords {
    font-size: 13px;
    color: #6b5a3f;
    border-top: 1px dashed #b8a374;
    padding-top: 6px;
    margin-top: 6px;
    font-family: monospace;
    cursor: pointer;
  }
  .popup-coords:hover { color: #8a5a3a; }

  .dc-pin {
    width: 26px; height: 26px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid rgba(0,0,0,0.5);
    box-shadow: 0 3px 8px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
  }
  .dc-pin::after {
    content: '';
    width: 8px; height: 8px;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
    transform: rotate(45deg);
  }

  #zoom-hint {
    position: absolute;
    bottom: 14px;
    right: 14px;
    font-size: 12px;
    color: var(--cream-dim);
    background: rgba(34,27,22,0.85);
    padding: 5px 10px;
    border-radius: 3px;
    z-index: 500;
    border: 1px solid var(--line);
  }

  @media (max-width: 760px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; min-width: 0; height: 46%; border-right: none; border-bottom: 1px solid var(--line); }
    #map-wrap { height: 54%; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="brand">
    <h1>Devil's Canyon</h1>
    <p>Interaktive Server-Karte</p>
  </div>

  <div id="search-wrap">
    <input id="search" type="text" placeholder="Ort suchen…" autocomplete="off">
  </div>

  <div id="filters"></div>

  <div id="list-wrap">
    <div id="empty-state">Keine Treffer für diese Suche/Filter.</div>
    <div id="list"></div>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="zoom-hint">Scrollen zum Zoomen · Klick auf Koordinate = kopieren</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ============================================================================
   DEVIL'S CANYON – INTERAKTIVE KARTE
   ============================================================================
   KALIBRIERUNG: bereits erledigt (siehe AFFINE unten, per Ausgleichsrechnung
   aus 11 echten Referenzpunkten berechnet). Neue Marker einfach mit ihrer
   Spiel-Koordinate (x,y aus vector3/vector4) unten bei LOCATIONS ergänzen -
   die Umrechnung auf Bild-Pixel passiert automatisch über gameToMap().
   ============================================================================ */

const MAP_IMAGE_URL = "map.jpg"; // <- euer neues Kartenbild (mit eigenem Branding)
const MAP_IMAGE_WIDTH = 7200;    // <- echte Pixel-Breite eures Kartenbilds
const MAP_IMAGE_HEIGHT = 5400;   // <- echte Pixel-Höhe eures Kartenbilds

// Kalibrierung per Ausgleichsrechnung (linare Regression) aus 11 echten
// Referenzpunkten (Stadt-Koordinaten + abgelesene Pixel-Position), deutlich
// genauer als eine Kalibrierung mit nur 2 Punkten. Alle 11 Punkte weichen im
// Schnitt nur ca. 1-6 Pixel vom Idealwert ab (bei 7200px Bildbreite).
// px = A*gx + B*gy + C   |   py = D*gx + E*gy + F
const AFFINE = {
  A:  0.615320, B: -0.000467, C: 4579.8674,
  D:  0.000350, E: -0.614414, F: 2188.0212,
};

function gameToMap(gx, gy) {
  const px = AFFINE.A * gx + AFFINE.B * gy + AFFINE.C;
  const py = AFFINE.D * gx + AFFINE.E * gy + AFFINE.F;
  // Leaflet CRS.Simple: y wächst nach OBEN im Koordinatensystem, Bild-Pixel-Y nach UNTEN.
  return [MAP_IMAGE_HEIGHT - py, px];
}

/* ============================================================================
   STANDORT-DATEN
   Eigene Kategorie-Farbe pro "type". Neue Punkte einfach unten ergänzen -
   kein Code an anderer Stelle muss angefasst werden.
   ============================================================================ */
const CATEGORIES = {
  city: { label: "Städte / Ortschaften", color: "#c8a46c" },
};

const LOCATIONS = [
  { type: "city", name: "Tumbleweed",      desc: "New Austin",   x: -5496.30, y: -2949.42 },
  { type: "city", name: "Armadillo",       desc: "New Austin",   x: -3675.23, y: -2610.96 },
  { type: "city", name: "Thieves' Landing", desc: "New Austin",  x: -1425.77, y: -2303.72 },
  { type: "city", name: "Blackwater",      desc: "West Elizabeth", x: -850.41, y: -1304.23 },
  { type: "city", name: "Strawberry",      desc: "West Elizabeth", x: -1792.02, y: -387.07 },
  { type: "city", name: "Valentine",       desc: "New Hanover",  x: -289.79,  y: 750.31 },
  { type: "city", name: "Colter",          desc: "Ambarino",     x: -1339.15, y: 2433.30 },
  { type: "city", name: "Rhodes",          desc: "Lemoyne",      x: 1308.77,  y: -1298.01 },
  { type: "city", name: "Saint Denis",     desc: "Lemoyne",      x: 2607.62,  y: -1148.25 },
  { type: "city", name: "Van Horn Trading Post", desc: "New Hanover", x: 2961.52, y: 502.68 },
  { type: "city", name: "Annesburg",       desc: "New Hanover",  x: 2871.80,  y: 1337.08 },
];

/* ============================================================================
   MAP SETUP
   ============================================================================ */
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 3,
  zoomSnap: 0.25,
  attributionControl: false,
});

const bounds = [[0, 0], [MAP_IMAGE_HEIGHT, MAP_IMAGE_WIDTH]];

// Kartenbild-Layer. Falls map.jpg fehlt, zeigt Leaflet einfach eine leere/graue
// Fläche - die Marker funktionieren trotzdem, nur ohne Hintergrundbild.
L.imageOverlay(MAP_IMAGE_URL, bounds, { errorOverlayUrl: undefined }).addTo(map);
map.fitBounds(bounds);

// Fix: Beim ersten Laden hat der Browser das Flexbox-Layout (Sidebar-Breite,
// Fonts) manchmal noch nicht final berechnet, wenn Leaflet initialisiert wird.
// Dadurch "verrutscht" die Karte in die Ecke. Nach vollständigem Laden die
// Kartengröße neu berechnen und wieder zentrieren.
window.addEventListener('load', () => {
  map.invalidateSize();
  map.fitBounds(bounds);
});
setTimeout(() => {
  map.invalidateSize();
  map.fitBounds(bounds);
}, 300);

/* ============================================================================
   PIXEL-HELFER
   Klick auf eine LEERE Stelle der Karte (kein Marker) zeigt die Pixel-Koordinate
   an dieser Stelle an. Nützlich, um neue LOCATIONS-Einträge grob zu verorten
   oder die Kalibrierung stichprobenartig zu prüfen. Die eigentliche Kalibrierung
   läuft über die AFFINE-Konstante oben (aus 11 Referenzpunkten berechnet).
   ============================================================================ */
const calibBox = L.control({ position: 'bottomleft' });
calibBox.onAdd = function () {
  const div = L.DomUtil.create('div');
  div.id = 'calib-readout';
  div.style.cssText = 'background:rgba(34,27,22,0.92);border:1px solid #3d3226;color:#c8a46c;' +
    'padding:6px 12px;border-radius:4px;font-family:monospace;font-size:13px;display:none;';
  return div;
};
calibBox.addTo(map);

map.on('click', (e) => {
  // Bild-Pixel-Koordinate aus Leaflet-latlng zurückrechnen (Umkehrung von gameToMap's Y-Flip)
  const pixelX = e.latlng.lng;
  const pixelY = MAP_IMAGE_HEIGHT - e.latlng.lat;
  const readout = document.getElementById('calib-readout');
  readout.style.display = 'block';
  readout.innerHTML = `Pixel-Koordinate hier: <b>x=${pixelX.toFixed(0)}, y=${pixelY.toFixed(0)}</b>` +
    `<br><span style="opacity:0.7">→ nur zur Orientierung, z.B. beim Verorten neuer Marker</span>`;
});

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div class="dc-pin" style="background:${color}"></div>`,
    iconSize: [26, 26],
    iconAnchor: [13, 24],
    popupAnchor: [0, -22],
  });
}

const markersByLoc = new Map();
const layerGroup = L.layerGroup().addTo(map);

function buildPopupHTML(loc) {
  const catLabel = CATEGORIES[loc.type].label;
  return `
    <div class="popup-eyebrow">${catLabel}</div>
    <div class="popup-title">${loc.name}</div>
    <div class="popup-desc">${loc.desc}</div>
    <div class="popup-coords" data-coords="vector3(${loc.x.toFixed(2)}, ${loc.y.toFixed(2)}, 0.0)" title="Klicken zum Kopieren">
      vector3(${loc.x.toFixed(2)}, ${loc.y.toFixed(2)}, 0.0)
    </div>
  `;
}

LOCATIONS.forEach(loc => {
  const latlng = gameToMap(loc.x, loc.y);
  const marker = L.marker(latlng, { icon: makeIcon(CATEGORIES[loc.type].color) })
    .bindPopup(buildPopupHTML(loc));
  marker.on('popupopen', () => {
    const el = document.querySelector('.popup-coords');
    if (el) {
      el.onclick = () => {
        navigator.clipboard?.writeText(el.dataset.coords);
        el.textContent = "Kopiert!";
        setTimeout(() => { el.textContent = el.dataset.coords; }, 1200);
      };
    }
  });
  layerGroup.addLayer(marker);
  markersByLoc.set(loc, marker);
});

/* ============================================================================
   SIDEBAR: Filter + Liste + Suche
   ============================================================================ */
const activeTypes = new Set(Object.keys(CATEGORIES));
let searchTerm = "";

const filtersEl = document.getElementById('filters');
Object.entries(CATEGORIES).forEach(([key, cat]) => {
  const count = LOCATIONS.filter(l => l.type === key).length;
  const row = document.createElement('label');
  row.className = 'filter-row';
  row.innerHTML = `
    <input type="checkbox" checked data-type="${key}">
    <span class="filter-swatch" style="background:${cat.color}"></span>
    <span class="label">${cat.label}</span>
    <span class="count">${count}</span>
  `;
  row.querySelector('input').addEventListener('change', (e) => {
    if (e.target.checked) activeTypes.add(key); else activeTypes.delete(key);
    render();
  });
  filtersEl.appendChild(row);
});

function matchesFilters(loc) {
  if (!activeTypes.has(loc.type)) return false;
  if (searchTerm && !loc.name.toLowerCase().includes(searchTerm)) return false;
  return true;
}

function render() {
  layerGroup.clearLayers();
  const listEl = document.getElementById('list');
  const emptyEl = document.getElementById('empty-state');
  listEl.innerHTML = '';

  const visible = LOCATIONS.filter(matchesFilters);
  emptyEl.style.display = visible.length === 0 ? 'block' : 'none';

  visible.forEach(loc => {
    layerGroup.addLayer(markersByLoc.get(loc));

    const item = document.createElement('div');
    item.className = 'loc-item';
    item.innerHTML = `
      <span class="dot" style="background:${CATEGORIES[loc.type].color}"></span>
      <div class="info">
        <div class="name">${loc.name}</div>
        <div class="meta">${CATEGORIES[loc.type].label}</div>
      </div>
    `;
    item.addEventListener('click', () => {
      const marker = markersByLoc.get(loc);
      map.setView(marker.getLatLng(), Math.max(map.getZoom(), 1), { animate: true });
      marker.openPopup();
    });
    listEl.appendChild(item);
  });
}

document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

render();
</script>
</body>
</html>
